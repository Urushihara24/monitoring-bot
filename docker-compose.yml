version: '3.8'

services:
  monitoring-bot:
    build: .
    container_name: monitoring-pricing-bot
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      - TZ=Europe/Moscow
    networks:
      - monitoring-net

networks:
  monitoring-net:
    driver: bridge
