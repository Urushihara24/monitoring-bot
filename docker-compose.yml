services:
  monitoring-bot:
    build: .
    container_name: monitoring-pricing-bot
    restart: unless-stopped
    
    # Healthcheck для проверки работоспособности
    healthcheck:
      test: ["CMD", "python3", "healthcheck.py"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    
    volumes:
      # Данные бота
      - ./data:/app/data
      - ./logs:/app/logs
      # Нужен для live-sync cookies из .env без рестарта контейнера
      - ./.env:/app/.env:ro
    env_file:
      - .env
    environment:
      - TZ=Europe/Moscow
    networks:
      - monitoring-net

networks:
  monitoring-net:
    driver: bridge
